# =============================================================
# NFC Spoolman Middleware — Configuration (Single Toolhead)
# =============================================================
# Copy this file to ~/SpoolSense/config.yaml and fill in your values.
#
#   cp config.example.single.yaml ~/SpoolSense/config.yaml
#
# This config is for single-toolhead printers (one extruder, one
# ESP32, one PN532 NFC reader). On every scan, SET_ACTIVE_SPOOL
# is called directly via Moonraker.
# =============================================================

# ---- Toolhead Mode ------------------------------------------
#
# single      — For single-toolhead printers. Calls SET_ACTIVE_SPOOL
#               directly on every scan. One ESP32, one PN532.
#
# toolchanger — For multi-toolhead printers (e.g. MadMax, Stealthchanger).
#               Saves spool ID per toolhead and publishes LED color.
#               klipper-toolchanger handles SET_ACTIVE_SPOOL at toolchange.
#
# afc         — For lane-based filament changers (BoxTurtle, NightOwl, etc.)
#               running the AFC-Klipper Add-On. Calls AFC's SET_SPOOL_ID
#               to register the spool in the correct lane. AFC handles
#               spool tracking, color, material, and weight automatically.
#
toolhead_mode: "single"

# ---- Toolheads ----------------------------------------------
#
# For single mode, only one toolhead is needed.
# This must match your MQTT topic.
#
toolheads:
  - "T0"

# ---- MQTT Broker --------------------------------------------
# Usually your Home Assistant server running Mosquitto.
mqtt:
  broker: "YOUR_HOME_ASSISTANT_IP"    # e.g. "192.168.1.100"
  port: 1883
  username: "your_mqtt_username"
  password: "your_mqtt_password"

# ---- Spoolman URL (optional) -------------------------------
# Default port is 7912.
# If omitted, SpoolSense runs in tag-only mode:
# scans still activate lanes and publish color/lock state,
# but Spoolman lookup, spool creation, and weight sync are disabled.
spoolman_url: "http://YOUR_SPOOLMAN_IP:7912"

# ---- Moonraker URL ------------------------------------------
# Your Klipper/Moonraker instance.
moonraker_url: "http://YOUR_KLIPPER_IP"

# ---- Low Spool Threshold ------------------------------------
# Remaining weight (grams) that triggers a low spool warning.
# Publishes low_spool status to MQTT and triggers the ESP32
# LED pulse effect.
#
low_spool_threshold: 100

# ---- Klipper Variables File (optional) ----------------------
# Path to Klipper's save_variables file.
# If not set, the middleware auto-discovers it from Moonraker.
# klipper_var_path: "~/printer_data/config/klipper-toolchanger/offset_save_file.cfg"

# ---- OpenPrintTag Scanner (optional) ------------------------
# Only needed if you are using an ESP32-WROOM-32 + PN5180 running
# the ryanch/openprinttag_scanner firmware alongside your PN532.
#
# Maps each scanner's MQTT device ID to the toolhead it serves.
# The device ID appears in the scanner's MQTT topic:
#   openprinttag/<device_id>/tag/state
# Use the actual device ID published by your scanner — check your MQTT
# broker or the scanner's web UI to find it.
#
# The mapped value must match an entry in your toolheads list above.
# SpoolSense will error at startup if a mapped lane is not in toolheads.
#
# Leave empty or omit if you are not using openprinttag_scanner.
#
# MQTT topic prefix used by openprinttag_scanner devices.
# Only change this if you have customized the scanner firmware.
# scanner_topic_prefix: "openprinttag"
#
# scanner_lane_map:
#   scanner_ab12cd: "T0"
