# =============================================================
# NFC Spoolman Middleware — Configuration
# =============================================================
# Copy this file to ~/SpoolSense/config.yaml and fill in your values.
#
#   cp config.example.yaml ~/SpoolSense/config.yaml
#
# This middleware supports three modes. Set toolhead_mode below.
# =============================================================

# ---- Toolhead Mode ------------------------------------------
#
# single      — For single-toolhead printers. Calls SET_ACTIVE_SPOOL
#               directly on every scan. One ESP32, one PN532.
#
# toolchanger — For multi-toolhead printers (e.g. MadMax, Stealthchanger).
#               Saves spool ID per toolhead and publishes LED color.
#               klipper-toolchanger handles SET_ACTIVE_SPOOL at toolchange.
#
# afc         — For lane-based filament changers (BoxTurtle, NightOwl, etc.)
#               running the AFC-Klipper Add-On. Calls AFC's SET_SPOOL_ID
#               to register the spool in the correct lane. AFC handles
#               spool tracking, color, material, and weight automatically.
#
toolhead_mode: "afc"

# ---- Toolheads / Lanes --------------------------------------
#
# For single mode:      ["T0"]
# For toolchanger mode: ["T0", "T1", "T2", "T3"]
# For afc mode:         ["lane1", "lane2", "lane3", "lane4"]
#
# These must match your MQTT topics and (for afc mode) your AFC
# lane config names from your AFC_stepper sections.
#
toolheads:
  - "lane1"
  - "lane2"
  - "lane3"
  - "lane4"

# ---- MQTT Broker --------------------------------------------
# Usually your Home Assistant server running Mosquitto.
mqtt:
  broker: "YOUR_HOME_ASSISTANT_IP"    # e.g. "192.168.1.100"
  port: 1883
  username: "your_mqtt_username"
  password: "your_mqtt_password"

# ---- Spoolman URL -------------------------------------------
# Default port is 7912.
spoolman_url: "http://YOUR_SPOOLMAN_IP:7912"

# ---- Moonraker URL ------------------------------------------
# Your Klipper/Moonraker instance.
moonraker_url: "http://YOUR_KLIPPER_IP"

# ---- Low Spool Threshold ------------------------------------
# Remaining weight (grams) that triggers a low spool warning.
#
# single/toolchanger: publishes low_spool status to MQTT and
#   triggers the ESP32 LED pulse effect.
# afc: logged to journal only — AFC manages its own low spool
#   behavior via enable_assist_weight.
#
low_spool_threshold: 100

# ---- AFC Mode Options (ignored in single/toolchanger) -------

# Path to AFC's variable file. The middleware watches this file for
# lane changes (spool insert/eject) to auto-lock/clear scanners and
# update BoxTurtle LEDs with filament colors.
afc_var_path: "~/printer_data/config/AFC/AFC.var.unit"

# Path to Klipper's save_variables file (single/toolchanger only).
# If not set, the middleware auto-discovers it from Moonraker.
# klipper_var_path: "~/printer_data/config/klipper-toolchanger/offset_save_file.cfg"

# Klipper macro name for setting BoxTurtle lane LED colors.
# The middleware calls this with: LANE=<name> R=<0-1> G=<0-1> B=<0-1> BREATH=<0|1>
# You must define this macro in your Klipper config — see afc/docs/setup.md.
afc_led_macro: "_SET_LANE_LED"

# ---- OpenPrintTag Scanner (optional) ------------------------
# Only needed if you are using ESP32-WROOM-32 + PN5180 boards running
# the ryanch/openprinttag_scanner firmware alongside your PN532 readers.
#
# Maps each scanner's MQTT device ID (derived from the last 3 octets
# of its WiFi MAC) to the AFC lane it serves.
#
# Each scanner publishes to:
#   openprinttag/<device_id>/tag/state
#
# The mapped value must match an entry in your toolheads list above.
# SpoolSense will error at startup if a mapped lane is not in toolheads.
#
# Leave empty or omit if you are not using openprinttag_scanner.
#
# scanner_lane_map:
#   esp32-lane1: "lane1"
#   esp32-lane2: "lane2"
#   esp32-lane3: "lane3"
#   esp32-lane4: "lane4"
