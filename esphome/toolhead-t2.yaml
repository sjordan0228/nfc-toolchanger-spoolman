# =============================================================
# ESPHome config for Toolhead T2 NFC Reader
# =============================================================
# Hardware: Waveshare ESP32-S3-Zero + PN532 NFC module (I2C mode)
#
# PN532 DIP Switch settings for I2C mode:
#   Switch 1: ON
#   Switch 2: OFF
#
# Wiring:
#   PN532 VCC  → ESP32-S3 3V3
#   PN532 GND  → ESP32-S3 GND
#   PN532 SDA  → ESP32-S3 GPIO1
#   PN532 SCL  → ESP32-S3 GPIO2
#
# Onboard LED:
#   WS2812 RGB LED on GPIO21 (built into the Waveshare ESP32-S3-Zero)
#   No external wiring needed for the LED.
#
# When an NFC tag is scanned, the UID is published to the MQTT
# topic nfc/toolhead/T2 as JSON: {"uid": "XX-XX-XX", "toolhead": "T0"}
# The middleware script on the Pi subscribes to this topic and
# updates Spoolman/Moonraker accordingly, then publishes the
# filament colour back to nfc/toolhead/T2/color.
# =============================================================

esphome:
  name: toolhead-t2
  friendly_name: Toolhead T2 NFC
  min_version: 2025.11.0
  name_add_mac_suffix: false

# ESP32-S3 board configuration
# Note: We use esp-idf framework as it compiles reliably on ESPHome 2026.x
esp32:
  variant: esp32s3
  framework:
    type: esp-idf

# Enable serial logging for debugging
logger:

# Enable Home Assistant API for OTA updates and device management
api:

# Enable over-the-air updates — after first USB flash, all updates are wireless
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Static IP prevents OTA upload failures due to DHCP address changes
  manual_ip:
    static_ip: 192.168.X.X   # Set your desired static IP for this device
    gateway: 192.168.X.1      # Usually your router IP
    subnet: 255.255.255.0
  # Fallback hotspot — activates if WiFi connection fails
  # Connect to this and visit 192.168.4.1 to reconfigure WiFi
  ap:
    ssid: "Toolhead-T2 Fallback"
    password: "CHANGE_ME"

# Captive portal serves the WiFi config page when in fallback hotspot mode
captive_portal:

# Globals — store current filament RGB so the low spool pulse effect
# inherits the correct colour when activated
globals:
  - id: current_r
    type: float
    initial_value: '0.0'
  - id: current_g
    type: float
    initial_value: '0.0'
  - id: current_b
    type: float
    initial_value: '0.0'

# MQTT — publishes NFC scan events and subscribes to colour updates
# Both the scan publish and colour subscription live in this single block
mqtt:
  broker: YOUR_HOME_ASSISTANT_IP   # e.g. 192.168.1.100
  username: !secret mqtt_username
  password: !secret mqtt_password
  # Subscribe to the colour topic published by the middleware after each NFC scan
  # The middleware publishes the filament colour as a hex string e.g. "FF0000"
  # This fires after the scan flash and sets the LED to the filament colour
  on_message:
    # Colour topic — handles success (hex colour), error (unknown tag), and off states
    - topic: "nfc/toolhead/T2/color"
      then:
        - lambda: |-
            std::string hex = x;
            if (hex == "error") {
              // Unknown or unregistered tag — flash red 3 times
              // Red flash is handled by the sequence below via a global flag
              // We trigger a script to avoid blocking the lambda
            }
        - if:
            condition:
              lambda: 'return x == "error";'
            then:
              # Flash red 3 times to indicate unknown/unregistered tag
              - light.turn_on:
                  id: status_led
                  red: 1.0
                  green: 0.0
                  blue: 0.0
                  brightness: 100%
                  effect: none
              - delay: 200ms
              - light.turn_off:
                  id: status_led
              - delay: 150ms
              - light.turn_on:
                  id: status_led
                  red: 1.0
                  green: 0.0
                  blue: 0.0
                  brightness: 100%
              - delay: 200ms
              - light.turn_off:
                  id: status_led
              - delay: 150ms
              - light.turn_on:
                  id: status_led
                  red: 1.0
                  green: 0.0
                  blue: 0.0
                  brightness: 100%
              - delay: 200ms
              - light.turn_off:
                  id: status_led
            else:
              - lambda: |-
                  std::string hex = x;
                  if (hex.length() == 6) {
                    int r = stoi(hex.substr(0, 2), nullptr, 16);
                    int g = stoi(hex.substr(2, 2), nullptr, 16);
                    int b = stoi(hex.substr(4, 2), nullptr, 16);
                    // Store RGB globally so low spool effect inherits the correct colour
                    id(current_r) = r / 255.0;
                    id(current_g) = g / 255.0;
                    id(current_b) = b / 255.0;
                    // Set the LED to the filament colour, clearing any active effect
                    auto call = id(status_led).turn_on();
                    call.set_effect("none");
                    call.set_rgb(r / 255.0, g / 255.0, b / 255.0);
                    call.perform();
                  } else if (hex == "000000") {
                    id(status_led).turn_off().perform();
                  }
    # Low spool topic — activates breathing effect when spool is 100g or less
    - topic: "nfc/toolhead/T2/low_spool"
      then:
        - if:
            condition:
              lambda: 'return x == "true";'
            then:
              # Start breathing effect — pulses the current filament colour
              - light.turn_on:
                  id: status_led
                  red: !lambda 'return id(current_r);'
                  green: !lambda 'return id(current_g);'
                  blue: !lambda 'return id(current_b);'
                  effect: "Low Spool Warning"
            else:
              # Clear breathing effect — restore solid colour
              - light.turn_on:
                  id: status_led
                  effect: none

# I2C bus configuration for PN532 communication
# Slow frequency (10000 Hz) improves reliability with the PN532
i2c:
  sda: GPIO1
  scl: GPIO2
  frequency: 10000
  scan: true  # Logs detected I2C devices on boot — useful for debugging

# Onboard WS2812 RGB LED (GPIO21 on Waveshare ESP32-S3-Zero)
# Displays the filament colour after a successful NFC scan
# rgb_order: RGB is correct for this board
light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: RGB
    pin: GPIO21
    num_leds: 1
    name: "T2 Status LED"
    id: status_led
    default_transition_length: 0s
    effects:
      # Breathing effect for low spool warning — pulses between 10% and 80% brightness
      # Uses the current LED colour (filament colour) so it stays visually meaningful
      - pulse:
          name: "Low Spool Warning"
          transition_length: 1s
          update_interval: 1s
          min_brightness: 10%
          max_brightness: 80%

# PN532 NFC reader configuration
pn532_i2c:
  id: pn532_board
  on_tag:
    # Triggered every time an NFC tag is brought near the reader
    then:
      # Log the tag UID to the serial console for debugging
      - logger.log:
          format: "Tag scanned on T2: %s"
          args: [x.c_str()]
      # Flash white 3 times to indicate a successful scan
      # Done manually with delays so it stops cleanly after exactly 3 flashes
      # WS2812 has no white channel — white is achieved by setting R+G+B all to max
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
      - delay: 150ms
      - light.turn_off:
          id: status_led
      - delay: 100ms
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
      - delay: 150ms
      - light.turn_off:
          id: status_led
      - delay: 100ms
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
      - delay: 150ms
      - light.turn_off:
          id: status_led
      # Publish the UID and toolhead identifier to MQTT as JSON
      # The middleware script on the Pi will receive this, look up the spool,
      # and publish the filament colour back to nfc/toolhead/T2/color
      - mqtt.publish:
          topic: "nfc/toolhead/T2"
          payload: !lambda |-
            return "{\"uid\": \"" + x + "\", \"toolhead\": \"T2\"}";
