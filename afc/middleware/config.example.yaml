# =============================================================
# NFC Spoolman Middleware — AFC/BoxTurtle Configuration
# =============================================================
# Copy this file to ~/nfc_spoolman/config.yaml and fill in your values.
#
#   cp config.example.yaml ~/nfc_spoolman/config.yaml
#
# This config is for AMS mode — lane-based filament changers
# like BoxTurtle running the AFC-Klipper Add-On.
# =============================================================

# AMS mode — for lane-based filament changers (BoxTurtle, NightOwl, etc.)
# The middleware calls AFC's SET_SPOOL_ID instead of Klipper's SET_ACTIVE_SPOOL.
# AFC handles spool tracking, color, material, and weight automatically.
toolhead_mode: "ams"

# Lane identifiers — must match your AFC lane config names.
# These are the lane names defined in your AFC_stepper sections.
toolheads:
  - "lane1"
  - "lane2"
  - "lane3"
  - "lane4"

# MQTT broker — usually your Home Assistant server running Mosquitto
mqtt:
  broker: "YOUR_HOME_ASSISTANT_IP"    # e.g. "192.168.1.100"
  port: 1883
  username: "your_mqtt_username"
  password: "your_mqtt_password"

# Spoolman instance URL (default port is 7912)
spoolman_url: "http://YOUR_SPOOLMAN_IP:7912"

# Moonraker / Klipper instance URL
moonraker_url: "http://YOUR_KLIPPER_IP"

# Low spool warning threshold in grams.
# In AMS mode this is used for logging only — AFC manages its own
# low spool behavior via enable_assist_weight.
low_spool_threshold: 100
