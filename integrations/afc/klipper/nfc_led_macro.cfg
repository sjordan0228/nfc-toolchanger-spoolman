# =============================================================
# NFC Spoolman — BoxTurtle LED Color Override Macro
# =============================================================
# This macro is called by the NFC middleware to set BoxTurtle lane
# LEDs to the actual filament color from Spoolman, overriding AFC's
# default hardcoded colors (green=ready, blue=loaded).
#
# SETUP:
#   1. Add this file to your Klipper config:
#        [include AFC/nfc_led_macro.cfg]
#      Or copy the macro into an existing config file.
#
#   2. Change "bt_leds" below to match YOUR LED section name.
#      Common names:
#        - AFC_Indicator    (AFC default)
#        - neopixel bt_leds (custom neopixel setup)
#      Check your AFC_Hardware.cfg or AFC_Turtle*.cfg for the
#      [AFC_led] or [neopixel] section name.
#
#   3. Update the lane-to-index mapping if your LED indices differ.
#      Standard BoxTurtle: lane1=1, lane2=2, lane3=3, lane4=4
#      QuattroBox or chained LEDs: adjust indices to match your
#      led_index values in AFC_stepper sections.
#
# LOW SPOOL WARNING:
#   When a spool is running low, the BREATH parameter is set to 1.
#   The LED dims to 20% of the filament color so low spool lanes
#   are visually distinct from healthy ones — no plugins required.
#
# The middleware calls this macro as:
#   _SET_LANE_LED LANE=lane1 R=0.500 G=0.200 B=0.800 BREATH=0
# =============================================================

[gcode_macro _SET_LANE_LED]
gcode:
  {% set lane = params.LANE %}
  {% set r = params.R|default(0)|float %}
  {% set g = params.G|default(0)|float %}
  {% set b = params.B|default(0)|float %}
  {% set breath = params.BREATH|default(0)|int %}

  # Map lane names to LED indices in the chain
  # Adjust these to match your AFC_stepper led_index values
  {% set led_index = 0 %}
  {% if lane == "lane1" %}{% set led_index = 1 %}
  {% elif lane == "lane2" %}{% set led_index = 2 %}
  {% elif lane == "lane3" %}{% set led_index = 3 %}
  {% elif lane == "lane4" %}{% set led_index = 4 %}
  {% endif %}

  {% if led_index > 0 %}
    {% if breath == 1 %}
      # Low spool warning — dim to 20% so it's visually distinct
      SET_LED LED=bt_leds RED={r * 0.2} GREEN={g * 0.2} BLUE={b * 0.2} INDEX={led_index}
    {% else %}
      # Full brightness filament color
      SET_LED LED=bt_leds RED={r} GREEN={g} BLUE={b} INDEX={led_index}
    {% endif %}
  {% endif %}
