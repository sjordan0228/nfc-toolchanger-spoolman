# =============================================================
# NFC Spool Scanner for BoxTurtle AFC — 4 Lane Single ESP32
# =============================================================
# Hardware: ESP32-WROOM DevKit + 4x PN532 NFC modules (I2C mode)
#
# This config drives 4 PN532 readers from a single ESP32 using
# 2 hardware I2C buses and 2 software I2C buses. Each reader
# maps to one BoxTurtle lane.
#
# PN532 DIP Switch settings for I2C mode (all 4 modules):
#   Switch 1: ON
#   Switch 2: OFF
#
# Power:
#   ESP32 powered via VIN from AFC-Lite 5V rail
#   PN532 modules powered directly from AFC-Lite 5V rail
#   (PN532 has onboard 3.3V regulator, 5V input is fine)
#
# When an NFC tag is scanned on any lane, the UID is published
# to MQTT as JSON: {"uid": "XX-XX-XX", "toolhead": "lane1"}
# The AFC middleware looks up the spool in Spoolman, calls
# SET_SPOOL_ID in AFC, and publishes a lock command to stop
# further scanning on that lane until the spool is ejected.
# =============================================================

substitutions:
  # Lane names — must match your AFC lane config
  lane1_id: "lane1"
  lane2_id: "lane2"
  lane3_id: "lane3"
  lane4_id: "lane4"

esphome:
  name: boxturtle-nfc
  friendly_name: BoxTurtle NFC Scanner
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.X.X   # Set your desired static IP
    gateway: 192.168.X.1
    subnet: 255.255.255.0
  ap:
    ssid: "BoxTurtle-NFC Fallback"
    password: "CHANGE_ME"

captive_portal:

# =============================================================
# Globals — scan lock state per lane
# =============================================================
# When true, scanning is disabled for that lane (spool registered).
# Middleware publishes "lock" or "clear" to control these.
globals:
  - id: lane1_locked
    type: bool
    initial_value: 'false'
  - id: lane2_locked
    type: bool
    initial_value: 'false'
  - id: lane3_locked
    type: bool
    initial_value: 'false'
  - id: lane4_locked
    type: bool
    initial_value: 'false'

# =============================================================
# MQTT
# =============================================================
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  on_message:
    # Lock/clear commands from middleware — one topic per lane
    # "lock" = stop scanning, spool is registered
    # "clear" = resume scanning, spool was ejected
    - topic: "nfc/toolhead/${lane1_id}/lock"
      then:
        - lambda: |-
            if (x == "lock") {
              id(lane1_locked) = true;
              ESP_LOGI("afc", "Lane 1 locked — scanning disabled");
            } else if (x == "clear") {
              id(lane1_locked) = false;
              ESP_LOGI("afc", "Lane 1 cleared — scanning resumed");
            }
    - topic: "nfc/toolhead/${lane2_id}/lock"
      then:
        - lambda: |-
            if (x == "lock") {
              id(lane2_locked) = true;
              ESP_LOGI("afc", "Lane 2 locked — scanning disabled");
            } else if (x == "clear") {
              id(lane2_locked) = false;
              ESP_LOGI("afc", "Lane 2 cleared — scanning resumed");
            }
    - topic: "nfc/toolhead/${lane3_id}/lock"
      then:
        - lambda: |-
            if (x == "lock") {
              id(lane3_locked) = true;
              ESP_LOGI("afc", "Lane 3 locked — scanning disabled");
            } else if (x == "clear") {
              id(lane3_locked) = false;
              ESP_LOGI("afc", "Lane 3 cleared — scanning resumed");
            }
    - topic: "nfc/toolhead/${lane4_id}/lock"
      then:
        - lambda: |-
            if (x == "lock") {
              id(lane4_locked) = true;
              ESP_LOGI("afc", "Lane 4 locked — scanning disabled");
            } else if (x == "clear") {
              id(lane4_locked) = false;
              ESP_LOGI("afc", "Lane 4 cleared — scanning resumed");
            }

# =============================================================
# I2C Buses — 2 hardware + 2 software for 4 PN532 modules
# =============================================================
# All PN532 modules use the same I2C address (0x24), so each
# needs its own isolated bus.

# Hardware I2C Bus 0 — Lane 1
i2c:
  - id: i2c_lane1
    sda: GPIO21
    scl: GPIO22
    frequency: 10000
    scan: true

  # Hardware I2C Bus 1 — Lane 2
  - id: i2c_lane2
    sda: GPIO16
    scl: GPIO17
    frequency: 10000
    scan: true

  # Software I2C Bus — Lane 3
  - id: i2c_lane3
    sda: GPIO25
    scl: GPIO26
    frequency: 10000
    scan: true

  # Software I2C Bus — Lane 4
  - id: i2c_lane4
    sda: GPIO27
    scl: GPIO33
    frequency: 10000
    scan: true

# =============================================================
# PN532 NFC Readers — one per lane
# =============================================================

pn532_i2c:
  # Lane 1
  - id: pn532_lane1
    i2c_id: i2c_lane1
    on_tag:
      then:
        - lambda: |-
            if (id(lane1_locked)) {
              ESP_LOGD("afc", "Lane 1 locked — ignoring scan");
              return;
            }
        - logger.log:
            format: "Tag scanned on ${lane1_id}: %s"
            args: [x.c_str()]
        - mqtt.publish:
            topic: "nfc/toolhead/${lane1_id}"
            payload: !lambda |-
              return "{\"uid\": \"" + x + "\", \"toolhead\": \"${lane1_id}\"}";

  # Lane 2
  - id: pn532_lane2
    i2c_id: i2c_lane2
    on_tag:
      then:
        - lambda: |-
            if (id(lane2_locked)) {
              ESP_LOGD("afc", "Lane 2 locked — ignoring scan");
              return;
            }
        - logger.log:
            format: "Tag scanned on ${lane2_id}: %s"
            args: [x.c_str()]
        - mqtt.publish:
            topic: "nfc/toolhead/${lane2_id}"
            payload: !lambda |-
              return "{\"uid\": \"" + x + "\", \"toolhead\": \"${lane2_id}\"}";

  # Lane 3
  - id: pn532_lane3
    i2c_id: i2c_lane3
    on_tag:
      then:
        - lambda: |-
            if (id(lane3_locked)) {
              ESP_LOGD("afc", "Lane 3 locked — ignoring scan");
              return;
            }
        - logger.log:
            format: "Tag scanned on ${lane3_id}: %s"
            args: [x.c_str()]
        - mqtt.publish:
            topic: "nfc/toolhead/${lane3_id}"
            payload: !lambda |-
              return "{\"uid\": \"" + x + "\", \"toolhead\": \"${lane3_id}\"}";

  # Lane 4
  - id: pn532_lane4
    i2c_id: i2c_lane4
    on_tag:
      then:
        - lambda: |-
            if (id(lane4_locked)) {
              ESP_LOGD("afc", "Lane 4 locked — ignoring scan");
              return;
            }
        - logger.log:
            format: "Tag scanned on ${lane4_id}: %s"
            args: [x.c_str()]
        - mqtt.publish:
            topic: "nfc/toolhead/${lane4_id}"
            payload: !lambda |-
              return "{\"uid\": \"" + x + "\", \"toolhead\": \"${lane4_id}\"}";
